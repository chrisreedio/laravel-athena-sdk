name: Code Style

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - 'pint.json'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - 'pint.json'
      - 'composer.json'
      - 'composer.lock'

jobs:
  pint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run Pint in check mode
        run: composer format:test
